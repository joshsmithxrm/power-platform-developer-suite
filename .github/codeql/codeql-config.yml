# CodeQL Configuration
# See: https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning
# Query filter docs: https://github.blog/changelog/2022-08-31-code-scanning-customize-your-codeql-analysis-using-query-filters/

name: "PPDS CodeQL Config"

paths-ignore:
  # Test projects - excluded from security analysis
  - tests/**
  - '**/*Tests/**'
  - '**/*.Tests/**'

queries:
  - uses: security-and-quality

# Disable style rules that conflict with project conventions
# See .github/CODE_SCANNING.md for rationale.
#
# Preference: rule-level excludes rather than path-ignore of the vendored
# credential-store subtree. A paths-ignore entry would silence every CodeQL
# rule on src/PPDS.Auth/Internal/CredentialStore/** (including a hypothetical
# future SQL-injection or XSS rule if someone hand-edits the vendored code).
# Globally excluding the two P/Invoke inventory rules
# (cs/call-to-unmanaged-code + cs/unmanaged-code) keeps every other CodeQL
# check running on that subtree. This is safe today because no PPDS
# first-party code outside that subtree does P/Invoke.
# See docs/qa/codeql-triage-2026-04-20.md.
query-filters:
  - exclude:
      id:
        # LINQ style suggestions - prefer explicit foreach
        - cs/linq/missed-where
        - cs/linq/missed-select
        # Style preferences - not quality issues
        - cs/missed-ternary-operator
        - cs/nested-if-statements
        # CLI patterns - intentional top-level exception handlers
        - cs/catch-of-all-exceptions
        # Path handling - all paths are controlled inputs in CLI context
        - cs/path-combine
        # Static tab ID counter written from constructor — thread-safe via Interlocked
        - cs/static-field-written-by-instance
        # SQL engine uses exact zero guard for divide-by-zero (intentional)
        - cs/equality-on-floats
        # Test assertions on default-constructed objects (false positive)
        - cs/empty-collection
        # Test methods have multi-step scenarios by design
        - cs/complex-block
        # Vendored git-credential-manager P/Invoke wrappers for platform-native
        # secret stores (Windows Credential Manager / advapi32, macOS Keychain /
        # CoreFoundation / SecurityFramework, Linux libsecret / Glib / Gobject).
        # Every file under src/PPDS.Auth/Internal/CredentialStore/ carries a
        # vendoring header from git-ecosystem/git-credential-manager v2.7.3.
        # Both rules merely inventory unmanaged-code use — they do not detect
        # bugs — and are not actionable for an OS secret-store binding.
        # Rule-level exclusion (not paths-ignore) so every other CodeQL rule
        # continues to run against the vendored subtree.
        - cs/call-to-unmanaged-code
        - cs/unmanaged-code
