name: Credential Store Interop

on:
  push:
    branches: [main]
    paths:
      - 'src/PPDS.Auth/**'
      - 'tests/PPDS.Auth.IntegrationTests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/credential-store-interop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/PPDS.Auth/**'
      - 'tests/PPDS.Auth.IntegrationTests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/credential-store-interop.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  interop:
    name: Interop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
            install-libsecret: true
            env-libsecret: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install libsecret + keyring (Linux only)
        if: matrix.install-libsecret
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libsecret-1-0 gnome-keyring dbus-x11
          echo "PPDS_TEST_LIBSECRET=${{ matrix.env-libsecret }}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore PPDS.sln

      - name: Build
        run: dotnet build PPDS.sln -c Release --no-restore

      - name: Run interop tests (Linux — wrap in dbus + gnome-keyring session)
        if: matrix.install-libsecret
        run: |
          # Launch a dbus session and unlock a headless gnome-keyring so libsecret has a backend.
          dbus-run-session -- sh -c '
            echo "" | gnome-keyring-daemon --unlock --components=secrets >/dev/null 2>&1 &
            sleep 1
            dotnet test tests/PPDS.Auth.IntegrationTests/PPDS.Auth.IntegrationTests.csproj \
              -c Release --no-build \
              --filter "FullyQualifiedName~NativeCredentialStoreInteropTests" \
              --logger "console;verbosity=detailed"
          '

      - name: Run interop tests (Windows / macOS)
        if: '!matrix.install-libsecret'
        run: |
          dotnet test tests/PPDS.Auth.IntegrationTests/PPDS.Auth.IntegrationTests.csproj \
            -c Release --no-build \
            --filter "FullyQualifiedName~NativeCredentialStoreInteropTests" \
            --logger "console;verbosity=detailed"

  interop-status:
    name: Interop status
    runs-on: ubuntu-latest
    needs: interop
    if: always()
    steps:
      - name: Check interop status
        run: |
          if [[ "${{ needs.interop.result }}" == "success" ]]; then
            echo "Interop tests passed on all platforms"
            exit 0
          else
            echo "Interop tests failed or skipped: ${{ needs.interop.result }}"
            exit 1
          fi
