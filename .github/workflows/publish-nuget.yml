name: Publish to NuGet

on:
  push:
    tags:
      - 'Plugins-v*'
      - 'Dataverse-v*'
      - 'Migration-v*'
      - 'Auth-v*'
      - 'Cli-v*'
      - 'Query-v*'
      - 'Mcp-v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Required for MinVer to read git history

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Determine package to publish
      id: package
      shell: bash
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "tag=$TAG" >> $GITHUB_OUTPUT

        if [[ $TAG == Plugins-v* ]]; then
          echo "package=PPDS.Plugins" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Plugins/PPDS.Plugins.csproj" >> $GITHUB_OUTPUT
        elif [[ $TAG == Dataverse-v* ]]; then
          echo "package=PPDS.Dataverse" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Dataverse/PPDS.Dataverse.csproj" >> $GITHUB_OUTPUT
        elif [[ $TAG == Migration-v* ]]; then
          echo "package=PPDS.Migration" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Migration/PPDS.Migration.csproj" >> $GITHUB_OUTPUT
        elif [[ $TAG == Auth-v* ]]; then
          echo "package=PPDS.Auth" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Auth/PPDS.Auth.csproj" >> $GITHUB_OUTPUT
        elif [[ $TAG == Cli-v* ]]; then
          echo "package=PPDS.Cli" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Cli/PPDS.Cli.csproj" >> $GITHUB_OUTPUT
        elif [[ $TAG == Query-v* ]]; then
          echo "package=PPDS.Query" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Query/PPDS.Query.csproj" >> $GITHUB_OUTPUT
        elif [[ $TAG == Mcp-v* ]]; then
          echo "package=PPDS.Mcp" >> $GITHUB_OUTPUT
          echo "projects=src/PPDS.Mcp/PPDS.Mcp.csproj" >> $GITHUB_OUTPUT
        else
          echo "Unknown tag format: $TAG"
          exit 1
        fi

    - name: Show version info
      shell: bash
      run: |
        echo "Tag: ${{ steps.package.outputs.tag }}"
        echo "Package: ${{ steps.package.outputs.package }}"
        echo "Projects: ${{ steps.package.outputs.projects }}"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Decode Plugins signing key
      # Only for Plugins-v* releases — decode the real private key from the
      # PLUGINS_SNK_BASE64 secret so pack can produce a signed assembly.
      # The real .snk is NEVER committed; it lives only in the runner's tempfs.
      if: startsWith(github.ref, 'refs/tags/Plugins-v')
      shell: bash
      env:
        PLUGINS_SNK_BASE64: ${{ secrets.PLUGINS_SNK_BASE64 }}
      run: |
        if [ -z "$PLUGINS_SNK_BASE64" ]; then
          echo "::error::PLUGINS_SNK_BASE64 secret is not set — cannot sign Plugins release"
          exit 1
        fi
        echo "$PLUGINS_SNK_BASE64" | base64 -d > src/PPDS.Plugins/PPDS.Plugins.snk
        size=$(stat -c%s src/PPDS.Plugins/PPDS.Plugins.snk)
        echo "::notice::Decoded Plugins signing key ($size bytes)"
        if [ "$size" -lt 500 ]; then
          echo "::error::Decoded key is unexpectedly small — secret may be corrupted"
          exit 1
        fi

    - name: Pack specific projects
      shell: bash
      run: |
        mkdir -p ./nupkgs
        for project in ${{ steps.package.outputs.projects }}; do
          echo "Packing $project"
          if [[ "$project" == *PPDS.Plugins* ]]; then
            # Re-pack Plugins with PublicSign=false + real key so the published
            # assembly carries a real strong-name signature, not just public.
            dotnet pack "$project" --configuration Release --output ./nupkgs \
              /p:PublicSign=false \
              /p:AssemblyOriginatorKeyFile=PPDS.Plugins.snk
          else
            dotnet pack "$project" --configuration Release --no-build --output ./nupkgs
          fi
        done

    - name: List packages
      shell: bash
      run: ls -la ./nupkgs/

    - name: Push packages to NuGet
      shell: bash
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        for package in ./nupkgs/*.nupkg; do
          echo "Pushing $package"
          dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        done

    - name: Push symbols to NuGet
      shell: bash
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        for package in ./nupkgs/*.snupkg; do
          echo "Pushing $package"
          dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
        done
      continue-on-error: true
