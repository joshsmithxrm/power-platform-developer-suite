name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (package only, no publish)'
        required: false
        default: true
        type: boolean
      channel:
        description: 'Release channel'
        required: true
        default: 'pre-release'
        type: choice
        options:
          - pre-release
          - stable

jobs:
  preflight:
    name: marketplace-listing-preflight
    runs-on: ubuntu-latest
    # Prong B of the AC-29 gate: re-run the listing AC tests before any
    # package or publish step, so a release triggered by direct tag push
    # (no PR) still fails fast on drift.
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/Extension-v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pytest + pyyaml
        run: pip install pytest pyyaml

      - name: Run marketplace-listing AC tests
        run: pytest tests/extension_listing/ -v

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    # Only run on Extension-v* tags or manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/Extension-v')

    strategy:
      matrix:
        include:
          - target: win32-x64
            rid: win-x64
          - target: linux-x64
            rid: linux-x64
          - target: darwin-x64
            rid: osx-x64
          - target: darwin-arm64
            rid: osx-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Resolve release tag SHA
        id: resolve-tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/Extension-v* ]]; then
            echo "::error::Publish requires a refs/tags/Extension-v* ref. Got: ${{ github.ref }}"
            exit 1
          fi
          sha="$(git rev-list -n 1 ${{ github.ref }})"
          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Failed to resolve a 40-char commit SHA for ${{ github.ref }}. Got: '$sha'"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/PPDS.Extension/package-lock.json

      - name: Install dependencies
        working-directory: src/PPDS.Extension
        run: npm ci

      - name: Typecheck
        working-directory: src/PPDS.Extension
        run: npm run typecheck:all

      - name: Lint
        working-directory: src/PPDS.Extension
        run: npm run lint

      - name: Test
        working-directory: src/PPDS.Extension
        run: npm test

      - name: Build
        working-directory: src/PPDS.Extension
        run: npm run compile

      - name: Bundle CLI for ${{ matrix.target }}
        working-directory: src/PPDS.Extension
        run: npm run bundle:cli -- --rid ${{ matrix.rid }}

      - name: Determine release channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_prerelease=${{ inputs.channel == 'pre-release' }}" >> $GITHUB_OUTPUT
          else
            # For tag-triggered releases, check the GitHub release prerelease flag
            echo "is_prerelease=${{ github.event.release.prerelease }}" >> $GITHUB_OUTPUT
          fi

      - name: Package extension (pre-release)
        if: steps.channel.outputs.is_prerelease == 'true'
        working-directory: src/PPDS.Extension
        run: npx vsce package --target ${{ matrix.target }} --pre-release

      - name: Package extension (stable)
        if: steps.channel.outputs.is_prerelease != 'true'
        working-directory: src/PPDS.Extension
        run: npx vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-vsix-${{ matrix.target }}
          path: src/PPDS.Extension/*.vsix
          retention-days: 30

      - name: Publish to VS Code Marketplace (pre-release)
        if: |
          steps.channel.outputs.is_prerelease == 'true' &&
          (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        working-directory: src/PPDS.Extension
        run: npx vsce publish --target ${{ matrix.target }} --pre-release --baseImagesUrl https://raw.githubusercontent.com/joshsmithxrm/power-platform-developer-suite/${{ steps.resolve-tag.outputs.sha }}/src/PPDS.Extension/media/
        env:
          VSCE_PAT: ${{ secrets.ADO_MARKETPLACE_PAT }}

      - name: Publish to VS Code Marketplace (stable)
        if: |
          steps.channel.outputs.is_prerelease != 'true' &&
          (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        working-directory: src/PPDS.Extension
        run: npx vsce publish --target ${{ matrix.target }} --baseImagesUrl https://raw.githubusercontent.com/joshsmithxrm/power-platform-developer-suite/${{ steps.resolve-tag.outputs.sha }}/src/PPDS.Extension/media/
        env:
          VSCE_PAT: ${{ secrets.ADO_MARKETPLACE_PAT }}
