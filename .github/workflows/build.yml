name: Build

on:
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'nuget.config'
      - 'src/PPDS.Extension/**'
  pull_request:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'nuget.config'
      - 'src/PPDS.Extension/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Dependency review for PRs - checks for vulnerabilities in dependency changes
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Allow existing vulnerabilities, only fail on new ones
          deny-licenses: ''

  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Required for MinVer to read git history

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.nuget/packages
          ~/.local/share/NuGet/http-cache
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props', 'nuget.config') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore dependencies
      run: dotnet restore

    - name: Check for vulnerable packages
      shell: pwsh
      run: |
        # Run vulnerability check - capture output and exit code separately
        # Note: dotnet list package can crash with CLR errors on some SDK versions
        $output = dotnet list package --vulnerable --include-transitive 2>&1
        $dotnetExitCode = $LASTEXITCODE
        $output | Write-Host

        # Handle CLR crashes or other unexpected failures gracefully
        if ($dotnetExitCode -ne 0 -and $output -notmatch "has the following vulnerable packages") {
          Write-Host ""
          Write-Host "::warning::Vulnerable package check exited with code $dotnetExitCode (possible SDK bug, continuing)"
        }
        elseif ($output -match "has the following vulnerable packages") {
          Write-Host ""
          Write-Host "::warning::Vulnerable packages detected - review security advisories above"
          # Note: Not failing the build to avoid blocking on transitive dependencies
          # that require upstream fixes. Dependency-review-action will catch new vulns.
        }
        else {
          Write-Host "No known vulnerabilities found in packages"
        }

        # Always succeed - vulnerability blocking is handled by dependency-review-action
        exit 0

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: packages
        path: |
          src/PPDS.Plugins/bin/Release/*.nupkg
          src/PPDS.Plugins/bin/Release/*.snupkg
        if-no-files-found: warn

  # Extension build (TypeScript)
  extension:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/PPDS.Extension/package-lock.json

      - name: Setup Python (for RPC DTO drift check)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Guards the C# ↔ TypeScript RPC DTO contract. Fails if a Response DTO
      # exists on one side and not the other. See scripts/check-rpc-dto-drift.py
      # and release plan workstream G3.
      - name: Check RPC DTO drift
        run: python scripts/check-rpc-dto-drift.py

      - name: Install dependencies
        working-directory: src/PPDS.Extension
        run: npm ci

      - name: Typecheck
        working-directory: src/PPDS.Extension
        run: npm run typecheck:all

      - name: Lint
        working-directory: src/PPDS.Extension
        run: npm run lint

      # Production-only vulnerability gate. Blocks CI on `high` or `critical`
      # advisories in shipped (non-dev) dependencies. Moderate-and-below are
      # intentionally not blocking (too noisy on transitive churn).
      # Dev-dep advisories are handled by dependabot PRs, not CI.
      - name: npm audit (production)
        working-directory: src/PPDS.Extension
        run: npm audit --omit=dev --audit-level=high

      # Dead-code detection (knip) — non-blocking advisory for now (Workstream L5).
      # Flip `continue-on-error` to false once the backlog of unused exports is cleared.
      - name: Dead-code check (advisory)
        working-directory: src/PPDS.Extension
        run: npm run dead-code
        continue-on-error: true

      - name: Build
        working-directory: src/PPDS.Extension
        run: npm run compile

      - name: Test
        working-directory: src/PPDS.Extension
        run: npm test

  # Gate job for branch protection
  build-status:
    runs-on: ubuntu-latest
    needs: [build, extension]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build.result }}" == "success" || "${{ needs.build.result }}" == "skipped" ]] && \
             [[ "${{ needs.extension.result }}" == "success" || "${{ needs.extension.result }}" == "skipped" ]]; then
            echo "Build passed"
            exit 0
          else
            echo "Build failed: build=${{ needs.build.result }}, extension=${{ needs.extension.result }}"
            exit 1
          fi
