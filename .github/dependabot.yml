version: 2
updates:
  # NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps"
    # Group related dependencies to reduce PR noise
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test-infrastructure:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "coverlet.*"
          - "Moq"
          - "FluentAssertions"
      dataverse:
        patterns:
          - "Microsoft.PowerPlatform.Dataverse.*"
      fakexrmeasy:
        patterns:
          - "FakeXrmEasy*"
      # Major version updates grouped separately for manual evaluation
      major-version-updates:
        applies-to: version-updates
        update-types:
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # VS Code Extension (npm)
  - package-ecosystem: "npm"
    directory: "/src/PPDS.Extension"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps(extension)"
